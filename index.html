<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Decoder</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__left">
        <img class="site-icon" src="icon.svg" width="20" height="20" alt="" />
        <a id="hub-link" class="nav-back label" href="#">← Все инструменты</a>
        <h1 class="site-title">JSON Decoder</h1>
      </div>
      <p id="status" class="body secondary site-header__status"></p>
    </header>

    <main class="workspace">
      <div class="toolbar card">
        <div class="options">
          <label class="option">
            <input id="pretty-print" type="checkbox" checked />
            <span class="body">Pretty print</span>
          </label>
          <label class="option">
            <input id="sort-keys" type="checkbox" />
            <span class="body">Сортировать ключи</span>
          </label>
          <label class="option">
            <input id="decode-bytes" type="checkbox" />
            <span class="body">Декодировать байтовые строки</span>
          </label>
          <label class="option option--scale" id="bytes-scale-wrap" hidden>
            <span class="body">scale</span>
            <input
              id="bytes-scale"
              class="scale-input"
              type="number"
              min="0"
              max="18"
              step="1"
              value="2"
            />
          </label>
        </div>
        <div class="toolbar__actions">
          <button id="sample-btn" class="button-ghost" type="button">Пример</button>
          <button id="paste-btn" class="button-secondary" type="button">Вставить</button>
          <button id="minify-btn" class="button-secondary" type="button" disabled>
            Minify
          </button>
          <button id="download-btn" class="button-secondary" type="button" disabled>
            Скачать
          </button>
          <button id="copy-btn" class="button-primary" type="button" disabled>
            Копировать
          </button>
        </div>
      </div>

      <p class="hints body secondary">
        <kbd>Ctrl</kbd>+<kbd>F</kbd> поиск · <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>C</kbd> копировать ·
        <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>M</kbd> minify · клик по байтовой строке — декодировать поле
      </p>

      <p id="parse-error" class="parse-error" hidden></p>

      <div class="split">
        <section class="panel card" aria-labelledby="input-label">
          <div class="panel__head">
            <span id="input-label" class="label">исходник</span>
            <button id="clear-btn" class="button-ghost" type="button">Очистить</button>
          </div>
          <textarea
            id="json-input"
            class="panel__editor"
            spellcheck="false"
            placeholder='{"a":1} или "{\"b\":2}"'
          ></textarea>
        </section>

        <section class="panel card" aria-labelledby="output-label">
          <div class="panel__head panel__head--output">
            <span id="output-label" class="label">результат · <span class="legend-key">ключ</span> · значение</span>
            <div class="search" role="search">
              <input
                id="search-input"
                class="search__input"
                type="search"
                placeholder="Поиск в JSON…"
                autocomplete="off"
                spellcheck="false"
              />
              <span id="search-count" class="search__count body secondary"></span>
              <button
                id="search-prev"
                class="button-ghost"
                type="button"
                title="Предыдущее (Shift+Enter)"
                disabled
              >
                ↑
              </button>
              <button
                id="search-next"
                class="button-ghost"
                type="button"
                title="Следующее (Enter)"
                disabled
              >
                ↓
              </button>
            </div>
          </div>
          <pre
            id="json-output"
            class="panel__editor panel__editor--output"
            aria-readonly="true"
          ><code></code></pre>
        </section>
      </div>
    </main>

    <p id="toast" class="toast" role="status" aria-live="polite" hidden></p>

    <script src="config.js"></script>
    <script src="bytes-decode.js"></script>
    <script src="decoder.js"></script>
    <script src="app.js"></script>
  </body>
</html>
